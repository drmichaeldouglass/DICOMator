name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install numpy pydicom pytest ruff

      - name: Byte-compile
        run: python -m compileall -q .

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -q
